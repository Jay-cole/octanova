<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – OctaNova</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    {% include "nav.html" %} {% with messages =
    get_flashed_messages(with_categories=true) %}
    <div class="flash-wrap">
      {% for c, m in messages %}
      <div class="flash {{ c }}">{{ m }}</div>
      {% endfor %}
    </div>
    {% endwith %}

    <div class="form-page">
      <div class="form-wrap">
        <h2>Forgot password?</h2>
        <p class="form-sub">
          Enter your account email and we'll send you a reset link.
        </p>
        <form method="POST">
          <div class="field">
            <label>Email</label>
            <div class="input-icon">
              <span class="icon">✉</span>
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
                autofocus
              />
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center; margin-top: 8px"
          >
            Send Reset Link →
          </button>
        </form>
        <div class="form-divider"></div>
        <p
          style="text-align: center; font-size: 0.88rem; color: var(--text-dim)"
        >
          Remembered it? <a href="/login">Back to login</a>
        </p>
      </div>
    </div>
  </body>
</html>
