<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – OctaNova</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    {% include "nav.html" %} {% with messages =
    get_flashed_messages(with_categories=true) %}
    <div class="flash-wrap">
      {% for c, m in messages %}
      <div class="flash {{ c }}">{{ m }}</div>
      {% endfor %}
    </div>
    {% endwith %}

    <div class="form-page">
      <div class="form-wrap">
        <h2>Create account</h2>
        <p class="form-sub">Join OctaNova and start getting matched</p>
        <form method="POST">
          <div class="section-label">Account</div>
          <div class="field">
            <label>Email <span class="hint">(used to log in)</span></label>
            <div class="input-icon">
              <span class="icon">✉</span>
              <input
                type="email"
                name="email"
                placeholder="you@example.com"
                required
                autofocus
              />
            </div>
          </div>
          <div class="field">
            <label>Password <span class="hint">(min 6 characters)</span></label>
            <div class="pw-wrap">
              <input
                type="password"
                name="password"
                id="pw-reg"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePw('pw-reg', this)"
                aria-label="Show password"
              >
                👁
              </button>
            </div>
          </div>
          <div class="form-divider"></div>
          <div class="section-label">I am a...</div>
          <div class="field">
            <div class="role-toggle">
              <label class="role-option">
                <input type="radio" name="role" value="student" checked />
                <span>🎓 Student</span>
              </label>
              <label class="role-option">
                <input type="radio" name="role" value="startup" />
                <span>🚀 Startup</span>
              </label>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center; margin-top: 8px"
          >
            Create Account →
          </button>
        </form>
        <div class="form-divider"></div>
        <p
          style="text-align: center; font-size: 0.88rem; color: var(--text-dim)"
        >
          Already have an account? <a href="/login">Log in</a>
        </p>
      </div>
    </div>

    <script>
      function togglePw(id, btn) {
        const input = document.getElementById(id);
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.textContent = show ? "🙈" : "👁";
        btn.style.opacity = show ? "1" : "0.5";
      }
    </script>
  </body>
</html>
