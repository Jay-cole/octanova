<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – OctaNova</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    {% include "nav.html" %} {% with messages =
    get_flashed_messages(with_categories=true) %}
    <div class="flash-wrap">
      {% for c, m in messages %}
      <div class="flash {{ c }}">{{ m }}</div>
      {% endfor %}
    </div>
    {% endwith %}

    <div class="form-page">
      <div class="form-wrap">
        <h2>Set new password</h2>
        <p class="form-sub">
          Choose a strong password — at least 6 characters.
        </p>
        <form method="POST">
          <div class="field">
            <label>New Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                name="password"
                id="pw1"
                placeholder="••••••••"
                required
                autofocus
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePw('pw1', this)"
                aria-label="Show password"
              >
                👁
              </button>
            </div>
          </div>
          <div class="field">
            <label>Confirm Password</label>
            <div class="pw-wrap">
              <input
                type="password"
                name="confirm"
                id="pw2"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePw('pw2', this)"
                aria-label="Show password"
              >
                👁
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center; margin-top: 8px"
          >
            Update Password →
          </button>
        </form>
      </div>
    </div>

    <script>
      function togglePw(id, btn) {
        const input = document.getElementById(id);
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        btn.textContent = show ? "🙈" : "👁";
        btn.style.opacity = show ? "1" : "0.5";
      }
    </script>
  </body>
</html>
